  # Standard MS MARCO passage benchmark: 6980 dev queries, all with qrels.
  # 8.8M passage corpus, so the full collection is indexed regardless.
dataset:
  name: "msmarco-passage/dev/small"
  index_path: "indexes/msmarco_passage"

  # Retrieve a deep candidate pool (top-1000) for BM25 / RM3.
  # The reranker only scores the top-100 of these
retrieval:
  bm25_num_results: 1000

query_expansion:
  method: "RM3"
  fb_docs: 10
  fb_terms: 10
  original_query_weight: 0.6

reranking:
  model_name: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  batch_size: 16
  rerank_top_k: 100

evaluation:
  num_queries: 1000
  seed: 42
  metrics:
    - "RR@10"
    - "nDCG@10"
    - "R@100"
